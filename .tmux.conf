# set -g @sessionx-layout 'reverse'

# チートシート/ヘルプ機能
# 現在のキーバインドを表示
bind-key ? list-keys
bind-key / run-shell "tmux list-keys | grep -i bind | less"

# カスタムヘルプ画面（ポップアップで表示）
bind-key F1 display-popup -E -w 90% -h 90% "cat ~/.tmux-cheatsheet.md | less"

# tmux-menusのヘルプ（Ctrl+\でアクセス可能）
# すでに設定済み: set -g @menus_trigger 'C-\\'

# カスタムキーバインド（マニアック機能）
# ペインの履歴を保存
bind-key P command-prompt -p 'save history to filename:' -I '~/tmux.history' 'capture-pane -S -; save-buffer %1 ; delete-buffer'

# ペインを新しいウィンドウに移動
bind-key ! break-pane -d

# ペインの入れ替え
bind-key \{ swap-pane -U
bind-key \} swap-pane -D

# ペインの同期トグル（全ペインに同じコマンドを送る）
bind-key S setw synchronize-panes \; display "Sync #{?synchronize-panes,ON,OFF}"

# ウィンドウの入れ替え
bind-key < swap-window -t -1 \; select-window -t -1
bind-key > swap-window -t +1 \; select-window -t +1

# マウスモードのトグル
bind-key m set-option -g mouse \; display "Mouse #{?mouse,ON,OFF}"

# ペインサイズの表示
bind-key D display-panes -d 0

# クリップボードからペースト（Cmd+V的な操作）
bind-key v run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

# ラストコマンドの再実行
bind-key R send-keys C-l \; clear-history \; send-keys Up Enter

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# プラグイン読み込み後にC-kを明示的に無効化（Emacsのkill-lineを優先）
unbind-key -n C-k


# color
set -ga terminal-overrides ",xterm-256color-italic:Tc"