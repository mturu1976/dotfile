# List of plugins

set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'



set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-pain-control'

#set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'omerxx/tmux-sessionx'

#tmux-mouse-swipe
#set -g @plugin 'jaclu/tmux-mouse-swipe'

# Shiftなどの修飾キーを正しく渡す
set -g xterm-keys on

# iTerm2とtmuxの互換性強化（Shift+Enterなどが正しく動作する）
set -as terminal-overrides ',xterm*:XT:smcup@:rmcup@'

# Option+Enterを正しく認識させる設定
set -as terminal-overrides ',xterm*:kEND5=\E[1;5F:kHOM5=\E[1;5H'
set -s escape-time 0

set -g @plugin 'rickstaa/tmux-notify'

# urlあったら開く
set -g @plugin 'tmux-plugins/tmux-open'

# ペイン内容の保存をONに
set -g @resurrect-capture-pane-contents 'on'

# makeコマンドでの開発サーバやpythonのREPLを起動することが多いので以下設定
set -g @resurrect-processes '"~make" "~python"'

# tmux起動時の自動リストアをONに
set -g @continuum-restore 'on'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# default term
set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# プレフィックスキーをc-j
set-option -g prefix C-j
#bind C-a send-prefix

set -g default-shell /bin/zsh
set -g default-command "exec /opt/homebrew/bin/zsh -l"

# 新しいセッション設定
bind n command-prompt -p "New session name:" "new-session -d -s '%%'"

# 縦横の分割（現在のディレクトリで開く）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# 再読み込み
bind r source-file ~/.tmux.conf \; display "再読み込み！"

# ポップアップウィンドウ（フローティング）
bind-key p display-popup -E -w 80% -h 80%
bind-key g display-popup -E -w 80% -h 80% "lazygit"
bind-key t display-popup -E -w 80% -h 80% "tig"

# クイックノート機能
bind-key N display-popup -E -w 60% -h 50% "nvim ~/quick-notes.md"

# フローティングターミナル（一時的なコマンド実行）
bind-key T display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# ペインのレイアウトプリセット
bind-key M-1 select-layout even-horizontal
bind-key M-2 select-layout even-vertical
bind-key M-3 select-layout main-horizontal
bind-key M-4 select-layout main-vertical
bind-key M-5 select-layout tiled

# Vim-tmux-navigator統合（Vimとのシームレスな移動）
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# プレフィックス付きでペイン移動（Vim統合と併用）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（大きく変更）
bind H resize-pane -L 10
bind J resize-pane -D 10
bind K resize-pane -U 10
bind L resize-pane -R 10

# 細かいペインリサイズ（Shift付き）
bind -r M-h resize-pane -L 2
bind -r M-j resize-pane -D 2
bind -r M-k resize-pane -U 2
bind -r M-l resize-pane -R 2
# tmuxとMacのクリップボードを共有
set -g set-clipboard on
set -g focus-events on

# ペインの開始番号を 0 から 1 に変更する
set-option -g base-index 1
set-window-option -g pane-base-index 1

# ウィンドウを閉じた時に番号を詰める
set-option -g renumber-windows on

# ウィンドウ名の自動リネーム
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

