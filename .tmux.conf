# set -g @jump-fg-color '\e[1m\e[31m'

# display-panesのカスタマイズ（Holiday）
set -g display-panes-time 3000  # 3秒間表示
set -g display-panes-colour '#593B40'
set -g display-panes-active-colour '#A67165'

# ペイン選択のカスタムキーバインド
bind-key s display-panes \; command-prompt -p "Select pane: " "select-pane -t %%"

# 直接ペインジャンプ（Option+数字、またはprefix+数字）
# Option+数字版（iTerm2でOption=Esc+設定が必要）
bind-key -n M-1 select-pane -t 1
bind-key -n M-2 select-pane -t 2
bind-key -n M-3 select-pane -t 3
bind-key -n M-4 select-pane -t 4
bind-key -n M-5 select-pane -t 5
bind-key -n M-6 select-pane -t 6
bind-key -n M-7 select-pane -t 7
bind-key -n M-8 select-pane -t 8
bind-key -n M-9 select-pane -t 9

# prefix+数字版（Optionキー設定不要）
bind-key 1 select-pane -t 1
bind-key 2 select-pane -t 2
bind-key 3 select-pane -t 3
bind-key 4 select-pane -t 4
bind-key 5 select-pane -t 5
bind-key 6 select-pane -t 6
bind-key 7 select-pane -t 7
bind-key 8 select-pane -t 8
bind-key 9 select-pane -t 9

# tmux-menus設定（ビジュアルメニューシステム）
# Ctrl+\の代わりにPrefix+\を使用
set -g @menus_trigger '\\'
set -g @menus_location_x 'C'
set -g @menus_location_y 'C'

# 手動でCtrl+\バインディングを追加（必要な場合）
bind-key -n C-\\ run-shell 'tmux display-menu -T "tmux menu" \
    "Windows" w "choose-window" \
    "Sessions" s "choose-session" \
    "Panes" p "display-panes" \
    "" \
    "Copy mode" c "copy-mode" \
    "Paste buffer" P "paste-buffer" \
    "" \
    "Reload config" r "source-file ~/.tmux.conf" \
    "Show bindings" ? "list-keys" \
    "" \
    "Kill pane" x "kill-pane" \
    "Kill window" X "kill-window"'

# tmux-sidebar設定
set -g @sidebar-tree-command 'tree -C'
set -g @sidebar-tree-position 'right'
set -g @sidebar-tree-width '40'

# sessionx設定の拡張（無効化 - 軽量なchoose-tree使用）
