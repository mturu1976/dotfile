## Gruvbox theme config
# Select gruvbox theme variant: 'dark' or 'light'
# dark256を使用して256色サポートを有効化
set -g @tmux-gruvbox 'dark256'

# ステータスバーのカスタマイズ
# 左側: セッション名にアイコンを追加
set -g @tmux-gruvbox-left-status-a '⚡ #S'

# 右側: 日付フォーマット（曜日 月/日）
set -g @tmux-gruvbox-right-status-x '%a %m/%d'

# 右側: 時刻（24時間表記）
set -g @tmux-gruvbox-right-status-y '%H:%M'

# 右側: シンプルな情報表示（パフォーマンス重視）
# Git情報は一時的に無効化
set -g @tmux-gruvbox-right-status-x '%a %m/%d'

# 時刻表示
set -g @tmux-gruvbox-right-status-y '%H:%M'

# ホスト名とプレフィックス表示
set -g @tmux-gruvbox-right-status-z '#{prefix_highlight} #h'

# 透明なステータスバー（お好みで）
# set -g @tmux-gruvbox-statusbar-alpha 'true'

# extrakto設定
set -g @extrakto_key 'tab'  # prefix + tab で起動
set -g @extrakto_split_direction 'v'  # 垂直分割で表示
set -g @extrakto_split_size '15'  # 分割サイズ
set -g @extrakto_grab_area 'window full'  # ウィンドウ全体から抽出
set -g @extrakto_filter_order 'all word path url'  # フィルター順序

# prefix-highlight設定
set -g @prefix_highlight_fg 'colour231'  # 白文字
set -g @prefix_highlight_bg 'colour214'  # Gruvbox yellow
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=colour231,bg=colour167'  # コピーモード時の色

# システムモニタリングの設定
set -g @cpu_low_icon "💚 "
set -g @cpu_medium_icon "💛 "
set -g @cpu_high_icon "💔 "
set -g @cpu_percentage_format "%3.0f%%"

# バッテリーアイコンのカスタマイズ
set -g @batt_icon_charge_tier8 '🌕'
set -g @batt_icon_charge_tier7 '🌖'
set -g @batt_icon_charge_tier6 '🌖'
set -g @batt_icon_charge_tier5 '🌗'
set -g @batt_icon_charge_tier4 '🌗'
set -g @batt_icon_charge_tier3 '🌘'
set -g @batt_icon_charge_tier2 '🌘'
set -g @batt_icon_charge_tier1 '🌑'
set -g @batt_icon_status_charged '🔋'
set -g @batt_icon_status_charging '⚡'
set -g @batt_icon_status_discharging '👎'

# ネットワーク速度表示
set -g @net_speed_interfaces "en0"
set -g @download_speed_format "%10s"
set -g @upload_speed_format "%10s"
set -g @net_speed_format "D:%10s U:%10s"

# Holidayテーマ設定
# ステータスバーの基本設定
set -g status-style 'bg=#593B40,fg=#BFA393'
set -g status-left '#[fg=#A67165,bold]#S '
set -g status-left-length 20
set -g status-right '#[fg=#BFA393]%H:%M '
set -g status-right-length 20

# ウィンドウステータスのフォーマット（Holiday版）
set -g window-status-format '#I:#W'
set -g window-status-current-format '#[fg=#A67165,bold]#I:#W'

# Holidayパレットでウィンドウステータスをカスタマイズ
# アクティブウィンドウ
set -g window-status-current-style 'bg=#A67165,fg=#26111F,bold'

# 非アクティブウィンドウ
set -g window-status-style 'bg=#593B40,fg=#BFA393'

# ペインボーダーの色設定（Holiday）
set -g pane-border-style 'fg=#593B40,bg=default'
set -g pane-active-border-style 'fg=#A67165,bg=default'

# ペインの背景色（微妙な違いで見分けやすく）
# 非アクティブペイン: 少し暗く
set -g window-style 'fg=#BFA393,bg=#26111F'

# アクティブペイン: 通常の背景
set -g window-active-style 'fg=#BFA393,bg=#2A1440'


# status statusline position
#set -g status-position top
set -g status-interval 5  # 1秒から5秒に変更してCPU負荷を軽減

# メッセージの色設定（Holiday）
set -g message-style 'bg=#593B40,fg=#BFA393'
set -g message-command-style 'bg=#593B40,fg=#BFA393'

# アラート設定
set -g visual-activity on
set -g visual-bell on
set -g visual-silence on
setw -g monitor-activity on
set -g bell-action other

# Mouse
set-option -g mouse on

# iTerm2との統合
# iTerm2の設定で以下を有効化：
# - "Applications in terminal may access clipboard"
# - "Mirror tmux paste buffer to local clipboard"
set -g set-clipboard on

# マウスドラッグで自動的にコピーモードを終了しない
set -g @yank_action 'copy-pipe'

# コピーモードの設定（emacsモード）
setw -g mode-keys emacs

# ステータスラインでのキーバインド（Emacsスタイル）
set -g status-keys emacs

# コピーモードの色設定（Holiday）
set -g mode-style 'bg=#593B40,fg=#BFA393'

# 選択範囲の色
set -g copy-mode-match-style 'bg=#A67165,fg=#26111F'
set -g copy-mode-current-match-style 'bg=#BFA393,fg=#26111F'

# コピーモードのキーバインド（画面位置を保持するため-and-cancelを削除）
bind-key -T copy-mode M-w send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode C-w send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode Enter send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode Escape send-keys -X cancel

# マウス選択時の自動コピー（画面位置を保持）
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# scroll
#set -g mouse on
#bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# fzf
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_OPTIONS='--height 40% -w 60% --border --inline-info --color=border:#94e2d5 --preview "bat --style=numbers --color=always --line-range :200 {}" --preview-window=+{2}+3/2 --color=fg:#a9b1d6,hl:#f5c2e7,fg+:#a6e3a1,bg+:#1a1b26,hl+:#fab387'

# tmux-thumbs設定（URLとハッシュをコピー）
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-regexp-1 '[a-z]+://[^\s]+' # URLs
set -g @thumbs-regexp-2 '[a-f0-9]{40}' # Git SHAs
set -g @thumbs-regexp-3 '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' # UUIDs

