## Gruvbox theme config
# Select gruvbox theme variant: 'dark' or 'light'
# dark256を使用して256色サポートを有効化
set -g @tmux-gruvbox 'dark256'

# ステータスバーのカスタマイズ
# 左側: セッション名にアイコンを追加
set -g @tmux-gruvbox-left-status-a '⚡ #S'

# 右側: 日付フォーマット（曜日 月/日）
set -g @tmux-gruvbox-right-status-x '%a %m/%d'

# 右側: 時刻（24時間表記）
set -g @tmux-gruvbox-right-status-y '%H:%M'

# 右側: Git情報とシステムモニタリング
# カスタムスクリプトでGitブランチを表示
set -g @tmux-gruvbox-right-status-x '#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2> /dev/null || echo "")'

# システムモニタリング統合
set -g @tmux-gruvbox-right-status-y '#{cpu_icon}#{cpu_percentage}'
set -g @tmux-gruvbox-right-status-z '#{battery_icon}#{battery_percentage}'

# 透明なステータスバー（お好みで）
# set -g @tmux-gruvbox-statusbar-alpha 'true'

# システムモニタリングの設定
set -g @cpu_low_icon "💚 "
set -g @cpu_medium_icon "💛 "
set -g @cpu_high_icon "💔 "
set -g @cpu_percentage_format "%3.0f%%"

# バッテリーアイコンのカスタマイズ
set -g @batt_icon_charge_tier8 '🌕'
set -g @batt_icon_charge_tier7 '🌖'
set -g @batt_icon_charge_tier6 '🌖'
set -g @batt_icon_charge_tier5 '🌗'
set -g @batt_icon_charge_tier4 '🌗'
set -g @batt_icon_charge_tier3 '🌘'
set -g @batt_icon_charge_tier2 '🌘'
set -g @batt_icon_charge_tier1 '🌑'
set -g @batt_icon_status_charged '🔋'
set -g @batt_icon_status_charging '⚡'
set -g @batt_icon_status_discharging '👎'

# ネットワーク速度表示
set -g @net_speed_interfaces "en0"
set -g @download_speed_format "%10s"
set -g @upload_speed_format "%10s"
set -g @net_speed_format "D:%10s U:%10s"

# ウィンドウステータスのフォーマット
set -g window-status-format '#I:#W#{?window_zoomed_flag,🔍,}'
set -g window-status-current-format '#[reverse,bold] #I:#W#{?window_zoomed_flag,🔍,} '

# Gruvboxカラーでウィンドウステータスをカスタマイズ
# アクティブウィンドウ: Gruvbox yellow/dark
set -g window-status-current-style 'bg=#fabd2f,fg=#282828,bold'

# 非アクティブウィンドウ
set -g window-status-style 'bg=#504945,fg=#ebdbb2'

# ペインボーダーの色設定（Gruvboxカラー）
set -g pane-border-style 'fg=#504945,bg=default'
set -g pane-active-border-style 'fg=#fabd2f,bg=default'

# ペインの背景色（微妙な違いで見分けやすく）
# 非アクティブペイン: 少し暗く
set -g window-style 'fg=#ebdbb2,bg=#1d2021'

# アクティブペイン: 通常の背景
set -g window-active-style 'fg=#ebdbb2,bg=#282828'


# status statusline position
#set -g status-position top
set -g status-interval 1

# メッセージの色設定（Gruvboxカラー）
set -g message-style 'bg=#504945,fg=#ebdbb2'
set -g message-command-style 'bg=#504945,fg=#ebdbb2'

# アラート設定
set -g visual-activity on
set -g visual-bell on
set -g visual-silence on
setw -g monitor-activity on
set -g bell-action other

# Mouse
set-option -g mouse on

# iTerm2との統合（Command+Cでコピーを可能にする）
# tmux 2.6以降では reattach-to-user-namespace は不要
# set-option -g default-command "reattach-to-user-namespace -l $SHELL"

# コピーモードの設定（emacsモード）
setw -g mode-keys emacs

# コピーモードの色設定（Gruvboxカラー）
set -g mode-style 'bg=#504945,fg=#ebdbb2'

# 選択範囲の色
set -g copy-mode-match-style 'bg=#fabd2f,fg=#282828'
set -g copy-mode-current-match-style 'bg=#fb4934,fg=#282828'

# コピーモードのキーバインド
bind-key -T copy-mode M-w send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode C-w send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode Escape send-keys -X cancel

# マウス選択時の自動コピー
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# scroll
#set -g mouse on
#bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# fzf
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_OPTIONS='--height 40% -w 60% --border --inline-info --color=border:#94e2d5 --preview "bat --style=numbers --color=always --line-range :200 {}" --preview-window=+{2}+3/2 --color=fg:#a9b1d6,hl:#f5c2e7,fg+:#a6e3a1,bg+:#1a1b26,hl+:#fab387'

# tmux-thumbs設定（URLとハッシュをコピー）
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-regexp-1 '[a-z]+://[^\s]+' # URLs
set -g @thumbs-regexp-2 '[a-f0-9]{40}' # Git SHAs
set -g @thumbs-regexp-3 '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' # UUIDs

# tmux-jump設定
set -g @jump-key 's'

# tmux-menus設定（ビジュアルメニューシステム）
# Ctrl+\の代わりにPrefix+\を使用
set -g @menus_trigger '\\'
set -g @menus_location_x 'C'
set -g @menus_location_y 'C'

# 手動でCtrl+\バインディングを追加（必要な場合）
bind-key -n C-\\ run-shell 'tmux display-menu -T "tmux menu" \
    "Windows" w "choose-window" \
    "Sessions" s "choose-session" \
    "Panes" p "display-panes" \
    "" \
    "Copy mode" c "copy-mode" \
    "Paste buffer" P "paste-buffer" \
    "" \
    "Reload config" r "source-file ~/.tmux.conf" \
    "Show bindings" ? "list-keys" \
    "" \
    "Kill pane" x "kill-pane" \
    "Kill window" X "kill-window"'

# tmux-sidebar設定
set -g @sidebar-tree-command 'tree -C'
set -g @sidebar-tree-position 'right'
set -g @sidebar-tree-width '40'

# sessionx設定の拡張
set -g @sessionx-bind 'o'
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'
set -g @sessionx-layout 'reverse'

# チートシート/ヘルプ機能
# 現在のキーバインドを表示
bind-key ? list-keys
bind-key / run-shell "tmux list-keys | grep -i bind | less"

# カスタムヘルプ画面（ポップアップで表示）
bind-key F1 display-popup -E -w 90% -h 90% "cat ~/.tmux-cheatsheet.md | less"

# tmux-menusのヘルプ（Ctrl+\でアクセス可能）
# すでに設定済み: set -g @menus_trigger 'C-\\'

# カスタムキーバインド（マニアック機能）
# ペインの履歴を保存
bind-key P command-prompt -p 'save history to filename:' -I '~/tmux.history' 'capture-pane -S -; save-buffer %1 ; delete-buffer'

# ペインを新しいウィンドウに移動
bind-key ! break-pane -d

# ペインの入れ替え
bind-key \{ swap-pane -U
bind-key \} swap-pane -D

# ペインの同期トグル（全ペインに同じコマンドを送る）
bind-key S setw synchronize-panes \; display "Sync #{?synchronize-panes,ON,OFF}"

# ウィンドウの入れ替え
bind-key < swap-window -t -1 \; select-window -t -1
bind-key > swap-window -t +1 \; select-window -t +1

# マウスモードのトグル
bind-key m set-option -g mouse \; display "Mouse #{?mouse,ON,OFF}"

# ペインサイズの表示
bind-key D display-panes -d 0

# クリップボードからペースト（Cmd+V的な操作）
bind-key v run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

# ラストコマンドの再実行
bind-key R send-keys C-l \; clear-history \; send-keys Up Enter

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


# color
set -ga terminal-overrides ",xterm-256color-italic:Tc"