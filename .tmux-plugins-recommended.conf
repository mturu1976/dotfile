# おすすめプラグイン設定（パフォーマンスと実用性のバランス版）

# 基本プラグイン（現在の設定）
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 実用性重視の追加プラグイン
set -g @plugin 'tmux-plugins/tmux-yank'        # クリップボード連携
set -g @plugin 'tmux-plugins/tmux-copycat'     # 高度な検索
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'  # プレフィックス表示

# オプション（お好みで）
# set -g @plugin 'nhdaly/tmux-better-mouse-mode'  # マウス操作改善
# set -g @plugin 'Morantron/tmux-fingers'         # ヒントモード
# set -g @plugin 'tmux-plugins/tmux-urlview'      # URL一覧表示
# set -g @plugin 'tmux-plugins/tmux-logging'      # ロギング機能

# tmux-yank設定
set -g @yank_selection_mouse 'clipboard'  # マウス選択でクリップボードへ

# tmux-copycat設定
set -g @copycat_search_C-f 'file'
set -g @copycat_search_C-u 'url'

# tmux-prefix-highlight設定
set -g @prefix_highlight_fg 'colour231'
set -g @prefix_highlight_bg 'colour04'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=colour231,bg=colour05'

# ステータスバーにプレフィックス表示を追加
set -g @tmux-gruvbox-right-status-z '#{prefix_highlight} #h'